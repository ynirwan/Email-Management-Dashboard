kind = "web"
previewPath = "/"
title = "ZeniPost Email Platform"
version = "1.0.0"
id = "artifacts/email-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25636
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/email-platform run dev"

[services.env]
PORT = "25636"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/email-platform", "run", "build"]
publicDir = "artifacts/email-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
