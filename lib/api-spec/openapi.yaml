openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ZeniPost Email Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: plans
    description: Plan management
  - name: settings
    description: Settings management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/{id}/plan:
    patch:
      operationId: updateUserPlan
      tags: [users]
      summary: Update user plan
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanRequest"
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List all plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlansListResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get platform settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Platform settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update platform settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [users]
      summary: Get dashboard stats summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        company:
          type: string
      required:
        - name
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        company:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, user]
        plan:
          type: string
          enum: [free, starter, pro, enterprise]
        isActive:
          type: boolean
        emailsUsed:
          type: integer
        emailsLimit:
          type: integer
        subscribersUsed:
          type: integer
        subscribersLimit:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - plan
        - isActive
        - emailsUsed
        - emailsLimit
        - subscribersUsed
        - subscribersLimit
        - createdAt

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        company:
          type: string
        isActive:
          type: boolean

    UpdatePlanRequest:
      type: object
      properties:
        plan:
          type: string
          enum: [free, starter, pro, enterprise]
      required:
        - plan

    UsersListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - users
        - total
        - page
        - limit

    Plan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        emailsPerMonth:
          type: integer
        subscribers:
          type: integer
        features:
          type: array
          items:
            type: string
        isPopular:
          type: boolean
      required:
        - id
        - name
        - price
        - emailsPerMonth
        - subscribers
        - features
        - isPopular

    PlansListResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: "#/components/schemas/Plan"
      required:
        - plans

    Settings:
      type: object
      properties:
        smtpHost:
          type: string
          nullable: true
        smtpPort:
          type: integer
          nullable: true
        smtpUser:
          type: string
          nullable: true
        smtpFromEmail:
          type: string
          nullable: true
        smtpFromName:
          type: string
          nullable: true
        awsRegion:
          type: string
          nullable: true
        maxEmailsPerDay:
          type: integer
        maintenanceMode:
          type: boolean
        allowRegistrations:
          type: boolean
        siteName:
          type: string
        supportEmail:
          type: string
          nullable: true
      required:
        - maxEmailsPerDay
        - maintenanceMode
        - allowRegistrations
        - siteName

    UpdateSettingsRequest:
      type: object
      properties:
        smtpHost:
          type: string
        smtpPort:
          type: integer
        smtpUser:
          type: string
        smtpPassword:
          type: string
        smtpFromEmail:
          type: string
        smtpFromName:
          type: string
        awsRegion:
          type: string
        maxEmailsPerDay:
          type: integer
        maintenanceMode:
          type: boolean
        allowRegistrations:
          type: boolean
        siteName:
          type: string
        supportEmail:
          type: string

    StatsSummary:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        totalEmailsSent:
          type: integer
        totalSubscribers:
          type: integer
        planBreakdown:
          type: object
          properties:
            free:
              type: integer
            starter:
              type: integer
            pro:
              type: integer
            enterprise:
              type: integer
          required:
            - free
            - starter
            - pro
            - enterprise
      required:
        - totalUsers
        - activeUsers
        - totalEmailsSent
        - totalSubscribers
        - planBreakdown
